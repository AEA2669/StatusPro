<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control (Sender)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 15px auto;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-red { background-color: #ff4d4d; }
        .btn-blue { background-color: #4da6ff; }
        .btn-reset { background-color: #888; }
        #status { margin-top: 20px; color: #aaa; font-family: monospace; }
    </style>
</head>
<body>

    <h2>Control Panel</h2>
    <p>Tap a button to change the viewer screen.</p>

    <button class="btn btn-red" onclick="sendCommand('RED')">Trigger Code RED</button>
    <button class="btn btn-blue" onclick="sendCommand('BLUE')">Trigger Code BLUE</button>
    <button class="btn btn-reset" onclick="sendCommand('RESET')">Reset Screen</button>

    <div id="status">Connecting to broker...</div>

    <script>
        // Connect to a free, public MQTT broker over WebSockets
        const brokerUrl = 'wss://broker.hivemq.com:8000/mqtt';
        const client = mqtt.connect(brokerUrl);
        
        // A unique channel name so your pages don't intercept other people's tests
        const topicName = 'alexov-tx-control-1999';
        const statusDiv = document.getElementById('status');

        client.on('connect', () => {
            statusDiv.innerText = "🟢 Connected and ready to send.";
            statusDiv.style.color = "#4dff4d";
        });

        client.on('error', (err) => {
            statusDiv.innerText = "🔴 Connection error.";
            console.error("MQTT Error:", err);
        });

        // Function to publish the command to the channel
        function sendCommand(commandCode) {
            if (client.connected) {
                client.publish(topicName, commandCode);
                statusDiv.innerText = `📤 Sent command: ${commandCode}`;
                
                // Revert status text after 2 seconds
                setTimeout(() => {
                    statusDiv.innerText = "🟢 Connected and ready to send.";
                }, 2000);
            } else {
                alert("Not connected to the broker yet.");
            }
        }
    </script>
</body>
</html>
